workflows:
  ios-workflow:
    name: iOS Build (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile_flutter/finality_app
          flutter pub get
      
      - name: Disable code signing in Xcode project
        script: |
          cd mobile_flutter/finality_app/ios
          # Disable automatic code signing using sed (macOS compatible)
          sed -i.bak 's/ENABLE_BITCODE = YES/ENABLE_BITCODE = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i.bak 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' Runner.xcodeproj/project.pbxproj
          sed -i.bak 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i.bak 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          echo "✅ Code signing disabled in Xcode project"
      
      - name: Build iOS (unsigned)
        script: |
          cd mobile_flutter/finality_app
          flutter build ios --release --no-codesign
      
      - name: Create IPA
        script: |
          cd mobile_flutter/finality_app/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r Finality.ipa Payload
          mv Finality.ipa ../../../../
    
    artifacts:
      - Finality.ipa
      
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile_flutter/finality_app
          flutter pub get
      
      - name: Build Android APK
        script: |
          cd mobile_flutter/finality_app
          flutter build apk --release
    
    artifacts:
      - mobile_flutter/finality_app/build/app/outputs/flutter-apk/app-release.apk
