workflows:
  ios-workflow:
    name: iOS Build (Unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile_flutter/finality_app
          flutter pub get
      
      - name: Create .env file
        script: |
          cd mobile_flutter/finality_app
          cat > .env << EOF
          # Supabase Configuration
          SUPABASE_URL=https://bfrkthzovwpjrvqktdjn.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmcmt0aHpvdndwanJ2cWt0ZGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk5NzgwNzgsImV4cCI6MjA3NTU1NDA3OH0.ml0TkLYk53U6CqP_iCc8XkZMusFCSI-nYOS0WyV43Nc
          EOF
          echo "✅ .env file created"
      
      - name: Build iOS framework
        script: |
          cd mobile_flutter/finality_app
          flutter build ios-framework --release --no-profile --no-debug
          
      - name: Build iOS with xcodebuild (no codesign)
        script: |
          cd mobile_flutter/finality_app/ios
          pod install
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath $PWD/build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive
      
      - name: Create IPA
        script: |
          cd mobile_flutter/finality_app/ios
          # Verify Info.plist exists
          ls -la build/Runner.xcarchive/Products/Applications/Runner.app/Info.plist
          # Create IPA from xcarchive
          mkdir -p Payload
          cp -r build/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -r Finality.ipa Payload
          # Move to workspace root for artifacts collection
          mv Finality.ipa $CM_BUILD_DIR/
          echo "✅ IPA created at workspace root"
          ls -lh $CM_BUILD_DIR/*.ipa
    
    artifacts:
      - Finality.ipa
      
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd mobile_flutter/finality_app
          flutter pub get
      
      - name: Build Android APK
        script: |
          cd mobile_flutter/finality_app
          flutter build apk --release
    
    artifacts:
      - mobile_flutter/finality_app/build/app/outputs/flutter-apk/app-release.apk
