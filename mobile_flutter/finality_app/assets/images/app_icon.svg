<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="50%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>
  
  <!-- Fond arrondi -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Bouclier/Shield stylisé -->
  <path d="M256,60 
           L420,120 
           L420,260 
           Q420,380 256,460 
           Q92,380 92,260 
           L92,120 
           Z" 
        fill="none" 
        stroke="url(#teal)" 
        stroke-width="16"
        opacity="0.3"/>
  
  <!-- Voiture simplifiée -->
  <g transform="translate(256, 300)">
    <!-- Carrosserie -->
    <path d="M-120,0 
             L-100,-30 
             L-50,-30 
             L-30,-70 
             L50,-70 
             L80,-30 
             L120,-30 
             L120,20 
             L-120,20 
             Z" 
          fill="url(#teal)"/>
    
    <!-- Vitre -->
    <path d="M-25,-65 L-45,-30 L70,-30 L45,-65 Z" 
          fill="#0F172A" 
          opacity="0.6"/>
    
    <!-- Roue gauche -->
    <circle cx="-70" cy="25" r="30" fill="#0F172A"/>
    <circle cx="-70" cy="25" r="18" fill="url(#teal)"/>
    
    <!-- Roue droite -->
    <circle cx="70" cy="25" r="30" fill="#0F172A"/>
    <circle cx="70" cy="25" r="18" fill="url(#teal)"/>
  </g>
  
  <!-- Check mark -->
  <g transform="translate(256, 140)">
    <circle cx="0" cy="0" r="65" fill="url(#teal)"/>
    <circle cx="0" cy="0" r="50" fill="#0F172A"/>
    <path d="M-25,5 L-10,22 L30,-18" 
          fill="none" 
          stroke="#14B8A6" 
          stroke-width="14" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>
