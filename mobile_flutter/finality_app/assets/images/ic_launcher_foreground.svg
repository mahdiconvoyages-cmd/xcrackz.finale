<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="50%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>
  
  <!-- Voiture simplifiée centrée -->
  <g transform="translate(54, 62)">
    <!-- Carrosserie -->
    <path d="M-28,0 
             L-24,-7 
             L-12,-7 
             L-7,-17 
             L12,-17 
             L19,-7 
             L28,-7 
             L28,5 
             L-28,5 
             Z" 
          fill="url(#tealGrad)"/>
    
    <!-- Vitre -->
    <path d="M-6,-15 L-10,-7 L16,-7 L10,-15 Z" 
          fill="#0F172A" 
          opacity="0.5"/>
    
    <!-- Roue gauche -->
    <circle cx="-17" cy="7" r="7" fill="#0F172A"/>
    <circle cx="-17" cy="7" r="4" fill="url(#tealGrad)"/>
    
    <!-- Roue droite -->
    <circle cx="17" cy="7" r="7" fill="#0F172A"/>
    <circle cx="17" cy="7" r="4" fill="url(#tealGrad)"/>
  </g>
  
  <!-- Check mark au-dessus -->
  <g transform="translate(54, 35)">
    <circle cx="0" cy="0" r="15" fill="url(#tealGrad)"/>
    <circle cx="0" cy="0" r="11" fill="#0F172A"/>
    <path d="M-6,1 L-2,6 L8,-5" 
          fill="none" 
          stroke="#14B8A6" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>
